<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnviroLedger – Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
<div class="login-card">
  <div class="login-logo">
    <span class="icon">🌿</span>
    <h1>EnviroLedger</h1>
    <p>University Campus Environmental Tracking</p>
  </div>

  {% for cat, msg in get_flashed_messages(with_categories=True) %}
  <div class="alert alert-{{ cat }}">⚠ {{ msg }}</div>
  {% endfor %}

  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username" required autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password" required>
    </div>
    <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem">
      🔐 Sign In
    </button>
  </form>

  <div style="margin-top:1.5rem; padding-top:1rem; border-top:1px solid var(--border)">
    <p style="font-size:0.72rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.5rem;">Demo Credentials</p>
    <div style="display:grid; gap:0.35rem;">
      <div style="font-size:0.8rem; background:var(--bg); padding:0.4rem 0.75rem; border-radius:6px; font-family:'JetBrains Mono',monospace; color:var(--muted)">
        admin / admin123 &nbsp;<span class="badge badge-admin">admin</span>
      </div>
      <div style="font-size:0.8rem; background:var(--bg); padding:0.4rem 0.75rem; border-radius:6px; font-family:'JetBrains Mono',monospace; color:var(--muted)">
        staff1 / staff123 &nbsp;<span class="badge badge-staff">staff</span>
      </div>
      <div style="font-size:0.8rem; background:var(--bg); padding:0.4rem 0.75rem; border-radius:6px; font-family:'JetBrains Mono',monospace; color:var(--muted)">
        analyst1 / analyst123 &nbsp;<span class="badge badge-analyst">analyst</span>
      </div>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
